<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPro Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #080b10; --surface: #161d2b; --cyan: #00d4ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; }
        .hidden { display: none !important; }
        .card { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        .btn-blue { background: var(--cyan); color: #080b10; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; border: none; }
    </style>
</head>
<body class="p-4">

    <div id="config-section" class="hidden flex flex-col items-center justify-center min-h-screen">
        <div class="card w-full max-w-md">
            <h1 class="text-xl font-bold mb-4 text-cyan-400 text-center">Configuration Supabase</h1>
            <p class="text-sm text-gray-400 mb-6">Collez vos clés API pour activer le Cloud.</p>
            <input type="text" id="cfg-url" placeholder="URL Supabase (https://...)">
            <input type="text" id="cfg-key" placeholder="Clé Anon (eyJ...)">
            <button onclick="saveSettings()" class="btn-blue">Connecter mon projet</button>
        </div>
    </div>

    <div id="auth-section" class="hidden flex flex-col items-center justify-center min-h-screen">
        <div class="card w-full max-w-md">
            <h1 class="text-xl font-bold mb-6 text-center italic">Crypto<span class="text-cyan-400">Pro</span></h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Mot de passe">
            <button onclick="handleAuth('login')" class="btn-blue mb-3">Se connecter</button>
            <button onclick="handleAuth('signup')" class="text-gray-400 text-sm w-full text-center">Créer un compte</button>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-bold">Mon Portefeuille</h1>
            <button onclick="logout()" class="text-red-400 text-xs font-bold uppercase">Déconnexion</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card">
                <h2 class="text-sm font-bold text-gray-400 uppercase mb-4">Ajouter un actif</h2>
                <input type="text" id="coin-id" placeholder="Nom (ex: bitcoin)">
                <input type="number" id="coin-qty" placeholder="Quantité">
                <input type="number" id="coin-price" placeholder="Prix d'achat ($)">
                <button onclick="addAsset()" class="btn-blue mt-2">Ajouter au Cloud</button>
            </div>

            <div class="card">
                <h2 class="text-sm font-bold text-gray-400 uppercase mb-4">Positions Cloud</h2>
                <div id="portfolio-list" class="space-y-4 text-sm">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // --- LOGIQUE DE DÉMARRAGE ---
        const urlSaved = localStorage.getItem('sb-url');
        const keySaved = localStorage.getItem('sb-key');
        let supabaseClient = null;

        window.onload = function() {
            if (!urlSaved || !keySaved) {
                document.getElementById('config-section').classList.remove('hidden');
            } else {
                try {
                    supabaseClient = window.supabase.createClient(urlSaved, keySaved);
                    checkSession();
                } catch (e) {
                    alert("Erreur d'initialisation. Vérifiez vos clés.");
                    localStorage.clear();
                    location.reload();
                }
            }
        };

        async function checkSession() {
            const { data } = await supabaseClient.auth.getSession();
            if (data?.session) {
                showApp();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
            }
        }

        // --- ACTIONS ---
        function saveSettings() {
            const u = document.getElementById('cfg-url').value.trim();
            const k = document.getElementById('cfg-key').value.trim();
            if (u && k) {
                localStorage.setItem('sb-url', u);
                localStorage.setItem('sb-key', k);
                location.reload();
            }
        }

        async function handleAuth(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            const { error } = (type === 'login') 
                ? await supabaseClient.auth.signInWithPassword({email: e, password: p})
                : await supabaseClient.auth.signUp({email: e, password: p});
            
            if (error) alert(error.message);
            else if (type === 'signup') alert("Compte créé ! Connectez-vous.");
            else location.reload();
        }

        function showApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            fetchData();
        }

        async function fetchData() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data, error } = await supabaseClient.from('positions').select('*').eq('user_id', user.id);
            
            const list = document.getElementById('portfolio-list');
            if (data && data.length > 0) {
                list.innerHTML = data.map(item => `
                    <div class="flex justify-between border-b border-gray-800 pb-2">
                        <span class="capitalize font-bold">${item.coin_id}</span>
                        <span>${item.amount} units</span>
                        <button onclick="deleteItem('${item.id}')" class="text-red-500">✕</button>
                    </div>
                `).join('');
            } else {
                list.innerHTML = "<p class='text-gray-500 italic'>Aucune donnée...</p>";
            }
        }

        async function addAsset() {
            const id = document.getElementById('coin-id').value.toLowerCase().trim();
            const qty = document.getElementById('coin-qty').value;
            const price = document.getElementById('coin-price').value;
            const { data: { user } } = await supabaseClient.auth.getUser();

            if(id && qty) {
                await supabaseClient.from('positions').insert([{ 
                    coin_id: id, amount: qty, buy_price: price, user_id: user.id 
                }]);
                location.reload();
            }
        }

        async function deleteItem(id) {
            await supabaseClient.from('positions').delete().eq('id', id);
            fetchData();
        }

        function logout() {
            supabaseClient.auth.signOut().then(() => location.reload());
        }
    </script>
</body>
</html>
