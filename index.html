<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoTracker Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CryptoPro">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2585/2585210.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0/dist/chartjs-plugin-annotation.min.js"></script>
    
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .nav-active { color: #3b82f6; background: rgba(59, 130, 246, 0.1); border-radius: 12px; }
        
        #mobile-menu { transition: transform 0.3s ease-in-out; transform: translateX(-100%); }
        #mobile-menu.open { transform: translateX(0); }
        #menu-overlay { transition: opacity 0.3s ease-in-out; display: none; }
        #menu-overlay.show { display: block; opacity: 1; }

        .btn-period { font-size: 10px; padding: 4px 12px; border-radius: 8px; background: #1e293b; color: #64748b; border: 1px solid #334155; }
        .btn-period.active { background: #3b82f6; color: white; border-color: #3b82f6; }
        
        /* Correction pour le plein écran sur iOS */
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen overflow-x-hidden">

    <div id="menu-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] opacity-0"></div>

    <aside id="mobile-menu" class="fixed top-0 left-0 h-full w-72 bg-slate-800 z-[70] p-6 shadow-2xl border-r border-slate-700">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white italic">C</div>
                <span class="font-black text-lg tracking-tighter">Menu</span>
            </div>
            <button onclick="toggleMenu()" class="text-slate-400 p-2 text-xl">✕</button>
        </div>
        
        <nav class="flex flex-col gap-2">
            <button onclick="navigate('dashboard')" id="m-nav-dashboard" class="nav-active flex items-center gap-3 p-4 font-bold text-sm uppercase tracking-widest">📊 Tableau</button>
            <button onclick="navigate('analytics')" id="m-nav-analytics" class="flex items-center gap-3 p-4 font-bold text-sm text-slate-400 uppercase tracking-widest">📈 Analyses</button>
            <button onclick="navigate('planner')" id="m-nav-planner" class="flex items-center gap-3 p-4 font-bold text-sm text-blue-400 uppercase tracking-widest">🛠️ Stratégies</button>
            <button onclick="navigate('strategy')" id="m-nav-strategy" class="flex items-center gap-3 p-4 font-bold text-sm text-emerald-400 uppercase tracking-widest">🔔 Alertes</button>
        </nav>
    </aside>

    <nav class="bg-slate-800/80 backdrop-blur-md border-b border-slate-700 sticky top-0 z-50">
        <div class="container mx-auto px-4 flex justify-between items-center h-16">
            <button onclick="toggleMenu()" class="lg:hidden p-2 text-slate-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white italic">C</div>
                <span class="font-black tracking-tighter text-xl hidden sm:block">CryptoTracker</span>
            </div>

            <div class="flex gap-1 bg-slate-900 p-1 rounded-xl border border-slate-700">
                <button onclick="setGlobalCurrency('usd')" id="btn-usd" class="px-3 py-1 rounded-lg text-[10px] font-bold bg-blue-600 text-white">USD</button>
                <button onclick="setGlobalCurrency('eur')" id="btn-eur" class="px-3 py-1 rounded-lg text-[10px] font-bold text-slate-400">EUR</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 lg:p-10">
        <div id="page-dashboard" class="space-y-6 fade-in">
            <header class="flex justify-between items-end">
                <div>
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Solde Total</p>
                    <p id="total-value" class="text-3xl font-mono font-bold text-emerald-400">0.00 $</p>
                </div>
                <div id="market-status" class="text-[9px] text-slate-500 bg-slate-800 px-2 py-1 rounded border border-slate-700">Chargement...</div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 space-y-6">
                    <section class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
                        <h2 class="text-[10px] font-black uppercase text-blue-400 mb-4 tracking-widest italic">Ajouter un actif</h2>
                        <div class="space-y-3">
                            <input type="text" id="asset-name" placeholder="Nom (ex: bitcoin)" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none focus:border-blue-500">
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="asset-amount" placeholder="Qté" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none">
                                <input type="number" id="asset-price" placeholder="Prix" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 outline-none">
                            </div>
                            <button onclick="addPosition()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Enregistrer</button>
                        </div>
                    </section>
                </div>

                <div class="lg:col-span-8 space-y-6">
                    <div class="bg-slate-800 rounded-3xl border border-slate-700 overflow-hidden shadow-xl">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-900/50 text-slate-500 text-[10px] uppercase">
                                <tr><th class="p-4">Actif</th><th class="p-4 text-center">Profit</th><th class="p-4 text-center">Action</th></tr>
                            </thead>
                            <tbody id="portfolio-body" class="divide-y divide-slate-700/50"></tbody>
                        </table>
                    </div>

                    <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-[10px] font-black uppercase text-slate-400 italic">Évolution estimée</h2>
                            <div class="flex gap-1">
                                <button onclick="updateTotalHistory(30, this)" class="btn-period active">30j</button>
                                <button onclick="updateTotalHistory(365, this)" class="btn-period">1an</button>
                            </div>
                        </div>
                        <div class="h-[250px]"><canvas id="totalHistoryChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-analytics" class="hidden space-y-6 fade-in">
            <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                <select id="asset-selector" onchange="updateAnalytics()" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 mb-6 font-bold text-blue-400"></select>
                <div class="h-[300px]"><canvas id="evolutionChart"></canvas></div>
            </div>
        </div>

        <div id="page-planner" class="hidden max-w-xl mx-auto fade-in">
            <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 text-center">
                <h2 class="text-xl font-black mb-4">⚙️ Paramètres</h2>
                <p class="text-slate-400 text-sm mb-6">Vos données sont stockées localement sur ce téléphone.</p>
                <button onclick="localStorage.clear(); location.reload();" class="bg-rose-500/10 text-rose-500 border border-rose-500/20 px-6 py-2 rounded-xl text-xs font-bold uppercase">Réinitialiser l'App</button>
            </div>
        </div>
        
        <div id="page-strategy" class="hidden fade-in text-center py-20 text-slate-500 italic text-sm">Signaux indisponibles.</div>
    </main>

    <script>
        let portfolio = JSON.parse(localStorage.getItem('myCryptoPortfolio')) || [];
        let lastPrices = JSON.parse(localStorage.getItem('lastKnownPrices')) || {};
        let globalCurrency = localStorage.getItem('prefCurrency') || 'usd';
        let totalHistoryChart = null, evolutionChart = null;
        const symbols = { usd: '$', eur: '€' };

        document.addEventListener('DOMContentLoaded', () => { 
            renderDashboard(); 
            updatePrices(); 
        });

        function toggleMenu() {
            document.getElementById('mobile-menu').classList.toggle('open');
            document.getElementById('menu-overlay').classList.toggle('show');
        }

        function navigate(pageId) {
            showPage(pageId);
            toggleMenu();
        }

        function showPage(pageId) {
            document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            if (pageId === 'analytics') populateAssetSelector();
        }

        async function updatePrices() {
            const ids = [...new Set(portfolio.map(p => p.id))];
            if (ids.length > 0) {
                try {
                    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?vs_currencies=usd,eur&ids=${ids.join(',')}`);
                    lastPrices = await res.json();
                    localStorage.setItem('lastKnownPrices', JSON.stringify(lastPrices));
                } catch (e) { console.log("Offline mode"); }
            }
            renderDashboard();
            updateTotalHistory(30);
            document.getElementById('market-status').innerText = `Live ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
        }

        function renderDashboard() {
            const body = document.getElementById('portfolio-body');
            body.innerHTML = ''; let totalVal = 0; const sym = symbols[globalCurrency];
            const consolidated = getConsolidatedData();

            Object.keys(consolidated).forEach(id => {
                const d = consolidated[id]; 
                const live = lastPrices[id]?.[globalCurrency] || 0;
                const avg = d.costInGlobal / d.amt; 
                const pnl = live ? ((live - avg) / avg) * 100 : 0;
                totalVal += (live * d.amt);

                body.innerHTML += `<tr class="border-b border-slate-700/30">
                    <td class="p-4 font-bold capitalize">${id}</td>
                    <td class="p-4 text-center font-bold ${pnl >= 0 ? 'text-emerald-400' : 'text-rose-400'}">${pnl.toFixed(2)}%</td>
                    <td class="p-4 text-center"><button onclick="deleteAsset('${id}')" class="text-slate-500">✕</button></td></tr>`;
            });

            document.getElementById('total-value').innerText = totalVal.toLocaleString(undefined, {minimumFractionDigits: 2}) + " " + sym;
        }

        async function updateTotalHistory(days, btn = null) {
            if(btn) { document.querySelectorAll('.btn-period').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
            const ctx = document.getElementById('totalHistoryChart').getContext('2d');
            try {
                const res = await fetch(`https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=${globalCurrency}&days=${days}&interval=daily`);
                const data = await res.json();
                const trend = data.prices.map(p => p[1]);
                const lastP = trend[trend.length-1];
                const currentVal = parseFloat(document.getElementById('total-value').innerText.replace(/[^\d.-]/g, '')) || 0;
                const history = trend.map(tp => (tp / lastP) * (currentVal || 1000));
                const labels = data.prices.map(p => new Date(p[0]).toLocaleDateString('fr-FR', {day:'numeric', month:'short'}));

                if(totalHistoryChart) totalHistoryChart.destroy();
                totalHistoryChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: labels, datasets: [{ data: history, borderColor: '#3b82f6', borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', tension: 0.3 }]},
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: {display:false} }, scales: { x:{grid:{display:false}, ticks:{maxTicksLimit: 6}}, y:{grid:{color:'rgba(255,255,255,0.05)'}} } }
                });
            } catch(e) {}
        }

        function getConsolidatedData() {
            const consolidated = {};
            portfolio.forEach(pos => {
                if (!consolidated[pos.id]) consolidated[pos.id] = { id: pos.id, amt: 0, costInGlobal: 0 };
                let itemCost = pos.buyPrice * pos.amount;
                if (pos.buyCurrency !== globalCurrency) itemCost = (globalCurrency === 'usd') ? itemCost * 1.08 : itemCost / 1.08;
                consolidated[pos.id].amt += pos.amount;
                consolidated[pos.id].costInGlobal += itemCost;
            });
            return consolidated;
        }

        function addPosition() {
            const id = document.getElementById('asset-name').value.toLowerCase().trim();
            const amt = parseFloat(document.getElementById('asset-amount').value);
            const pr = parseFloat(document.getElementById('asset-price').value);
            if (id && amt && pr) {
                portfolio.push({ id, amount: amt, buyPrice: pr, buyCurrency: globalCurrency });
                localStorage.setItem('myCryptoPortfolio', JSON.stringify(portfolio));
                updatePrices();
                ['asset-name', 'asset-amount', 'asset-price'].forEach(i => document.getElementById(i).value = '');
            }
        }

        function deleteAsset(id) {
            if(confirm('Supprimer ?')) {
                portfolio = portfolio.filter(p => p.id !== id);
                localStorage.setItem('myCryptoPortfolio', JSON.stringify(portfolio));
                renderDashboard();
            }
        }

        function setGlobalCurrency(cur) {
            globalCurrency = cur; localStorage.setItem('prefCurrency', cur);
            location.reload();
        }

        function populateAssetSelector() {
            const sel = document.getElementById('asset-selector');
            const assets = [...new Set(portfolio.map(p => p.id))];
            sel.innerHTML = assets.map(a => `<option value="${a}">${a.toUpperCase()}</option>`).join('');
            if(assets.length) updateAnalytics();
        }

        async function updateAnalytics() {
            const id = document.getElementById('asset-selector').value;
            const ctx = document.getElementById('evolutionChart').getContext('2d');
            try {
                const res = await fetch(`https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=${globalCurrency}&days=30`);
                const data = await res.json();
                const prices = data.prices.map(p => p[1]);
                if(evolutionChart) evolutionChart.destroy();
                evolutionChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: prices.map((_,i)=>i), datasets: [{ label: id, data: prices, borderColor: '#3b82f6', fill: false, pointRadius: 0 }] },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            } catch(e) {}
        }
    </script>
</body>
</html>
