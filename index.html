<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CryptoPro | Cloud Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg:#080b10; --surface:#161d2b; --cyan:#00d4ff;
            --text:#e2eaf7; --text2:#7a90b2; --border:rgba(99,130,172,0.15);
        }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
        .glass { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; }
        input { background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; width: 100%; outline: none; }
        input:focus { border-color: var(--cyan); }
        .btn-cyan { background: var(--cyan); color: #080b10; font-weight: bold; padding: 12px; border-radius: 10px; width: 100%; transition: 0.2s; cursor: pointer; }
        .btn-cyan:hover { opacity: 0.9; transform: translateY(-1px); }
        .hidden { display: none !important; }
        .pnl-up { color: #00e676; }
        .pnl-down { color: #ff4d6a; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center">
        <div class="glass p-8 w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold tracking-tighter" style="font-family:'Space Mono'">CRYPTO<span style="color:var(--cyan)">PRO</span></h1>
                <p class="text-sm text-slate-400 mt-2">Connectez-vous pour voir vos actifs</p>
            </div>
            
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Mot de passe">
                <button onclick="handleAuth('login')" class="btn-cyan">Se connecter</button>
                <button onclick="handleAuth('signup')" class="text-xs text-slate-500 w-full hover:text-white transition">Créer un compte gratuitement</button>
            </div>
            <p id="auth-msg" class="text-rose-400 text-xs text-center mt-4"></p>
        </div>
    </div>

    <div id="app-screen" class="hidden max-w-5xl mx-auto">
        <nav class="flex justify-between items-center mb-10">
            <div class="text-xl font-bold" style="font-family:'Space Mono'">CRYPTO<span style="color:var(--cyan)">PRO</span></div>
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-xs text-slate-400"></span>
                <button onclick="logout()" class="text-xs font-bold text-rose-500 uppercase">Quitter</button>
            </div>
        </nav>

        <header class="text-center mb-12">
            <p class="text-xs uppercase tracking-widest text-slate-500 mb-2">Valeur du Portfolio</p>
            <h2 id="total-val" class="text-5xl font-bold text-cyan-400" style="font-family:'Space Mono'">0.00 $</h2>
        </header>

        <div class="grid md:grid-cols-3 gap-8">
            <div class="glass p-6 h-fit">
                <h3 class="text-xs font-bold uppercase text-slate-400 mb-4">Nouvel Actif</h3>
                <div class="space-y-3">
                    <input type="text" id="coin-id" placeholder="Nom (ex: bitcoin)">
                    <input type="number" id="coin-qty" placeholder="Quantité">
                    <input type="number" id="coin-price" placeholder="Prix d'achat ($)">
                    <button onclick="addAsset()" class="btn-cyan mt-2">Ajouter au Cloud</button>
                </div>
            </div>

            <div class="md:col-span-2 glass p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xs font-bold uppercase text-slate-400">Vos Positions Cloud</h3>
                    <span class="text-[10px] bg-cyan-500/10 text-cyan-400 px-2 py-1 rounded">LIVE</span>
                </div>
                <div id="portfolio-list" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. CONFIGURATION (METS TES CLÉS ICI)
        // ==========================================
        const SB_URL = "https://olfbpzceedwutwbwbmka.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9sZmJwemNlZWR3dXR3YndibWthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzgzOTUsImV4cCI6MjA5MDYxNDM5NX0.5PjYCqTi15fvgxp9sz-t_4yMS-WnfgfAXIGXr7zfymg"; 
        
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        let user = null;

        // ==========================================
        // 2. DÉMARRAGE ET SESSION
        // ==========================================
        window.onload = async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                user = session.user;
                showApp();
            }
        };

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('auth-msg');

            const { data, error } = (type === 'login') 
                ? await sb.auth.signInWithPassword({ email, password })
                : await sb.auth.signUp({ email, password });

            if (error) {
                msg.innerText = error.message;
            } else if (type === 'signup') {
                alert("Compte créé ! Vous pouvez maintenant vous connecter.");
            } else {
                location.reload();
            }
        }

        function showApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.email;
            loadData();
        }

        // ==========================================
        // 3. GESTION DES DONNÉES
        // ==========================================
        async function loadData() {
            // Récupérer les positions de la DB
            const { data, error } = await sb.from('positions').select('*').eq('user_id', user.id);
            if (error) return console.error(error);

            // Récupérer les prix via l'API CoinGecko
            const ids = data.map(p => p.coin_id).join(',');
            let prices = {};
            if (ids) {
                try {
                    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
                    prices = await res.json();
                } catch (e) { console.error("Prix indisponibles"); }
            }

            renderUI(data, prices);
        }

        function renderUI(portfolio, prices) {
            const list = document.getElementById('portfolio-list');
            let total = 0;

            if (portfolio.length === 0) {
                list.innerHTML = `<p class="text-slate-500 italic text-center py-10">Aucun actif dans le cloud.</p>`;
                return;
            }

            list.innerHTML = portfolio.map(pos => {
                const livePrice = prices[pos.coin_id]?.usd || 0;
                const value = livePrice * pos.amount;
                const pnl = livePrice ? ((livePrice - pos.buy_price) / pos.buy_price * 100) : 0;
                total += value;

                return `
                    <div class="flex items-center justify-between p-4 bg-slate-900/50 rounded-xl border border-white/5">
                        <div class="flex flex-col">
                            <span class="font-bold capitalize text-sm">${pos.coin_id}</span>
                            <span class="text-[10px] text-slate-500">${pos.amount} unités</span>
                        </div>
                        <div class="text-right">
                            <div class="font-bold text-sm">${value.toFixed(2)} $</div>
                            <div class="text-[10px] ${pnl >= 0 ? 'pnl-up' : 'pnl-down'} font-bold">
                                ${pnl >= 0 ? '▲' : '▼'} ${Math.abs(pnl).toFixed(2)}%
                            </div>
                        </div>
                        <button onclick="deletePos('${pos.id}')" class="ml-4 text-slate-600 hover:text-rose-500 transition">✕</button>
                    </div>
                `;
            }).join('');

            document.getElementById('total-val').innerText = total.toLocaleString() + " $";
        }

        async function addAsset() {
            const coin_id = document.getElementById('coin-id').value.toLowerCase().trim();
            const amount = document.getElementById('coin-qty').value;
            const buy_price = document.getElementById('coin-price').value;

            if (!coin_id || !amount) return alert("Remplissez les champs");

            const { error } = await sb.from('positions').insert([
                { coin_id, amount, buy_price, user_id: user.id }
            ]);

            if (error) alert(error.message);
            else {
                // Reset formulaire et recharger
                document.getElementById('coin-id').value = '';
                document.getElementById('coin-qty').value = '';
                document.getElementById('coin-price').value = '';
                loadData();
            }
        }

        async function deletePos(id) {
            if (confirm("Supprimer cette position ?")) {
                await sb.from('positions').delete().eq('id', id);
                loadData();
            }
        }

        function logout() {
            sb.auth.signOut().then(() => location.reload());
        }
    </script>
</body>
</html>
